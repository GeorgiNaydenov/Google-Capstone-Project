<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clinician AI KIT</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  #root { height: 100vh; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="DashboardScreen.jsx"></script>
<script type="text/babel" src="InboxScreen.jsx"></script>
<script type="text/babel" src="ImageExtractionScreen.jsx"></script>
<script type="text/babel" src="MultimodalQAScreen.jsx"></script>
<script type="text/babel" src="DbIntelligenceScreen.jsx"></script>
<script type="text/babel" src="PatientProfileScreen.jsx"></script>
<script type="text/babel">
  const TITLES = {
    dashboard: "Dashboard",
    inbox: "Clinical Inbox",
    patient: "Patient Record",
    extraction: "Image Extraction",
    qa: "Multimodal Q and A",
    db: "Database Intelligence",
    audit: "Audit Trail",
  };

  function App() {
    const [screen, setScreen] = React.useState(() => localStorage.getItem("caikit_screen") || "dashboard");
    const go = (s) => { setScreen(s); localStorage.setItem("caikit_screen", s); };

    let body;
    switch (screen) {
      case "dashboard": body = <DashboardScreen onOpenPatient={() => go("patient")} />; break;
      case "inbox": body = <InboxScreen />; break;
      case "patient": body = <PatientProfileScreen onBack={() => go("dashboard")} />; break;
      case "extraction": body = <ImageExtractionScreen />; break;
      case "qa": body = <MultimodalQAScreen />; break;
      case "db": body = <DbIntelligenceScreen />; break;
      case "audit": body = <AuditPlaceholder />; break;
      default: body = <DashboardScreen onOpenPatient={() => go("patient")} />;
    }
    return <AppShell current={screen} onNavigate={go} title={TITLES[screen] || "Dashboard"}>{body}</AppShell>;
  }

  function AuditPlaceholder() {
    return (
      <div style={{ padding: 48, color: "var(--on-surface-variant)", fontFamily: "var(--font-sans)" }}>
        <h1 style={{ fontSize: 26, fontWeight: 600, color: "var(--on-surface)", margin: 0 }}>Audit trail</h1>
        <p style={{ fontSize: 14 }}>Every agent action, data access, and clinician decision is recorded here for compliance review.</p>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
