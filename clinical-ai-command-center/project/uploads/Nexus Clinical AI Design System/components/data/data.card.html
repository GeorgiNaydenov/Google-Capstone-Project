<!-- @dsCard group="Components" viewport="700x320" name="Data Table & SQL Preview" subtitle="Dense clinical table, SQL transparency block" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--background); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1.25fr 1fr; gap: 16px; align-items: start; }
  .frame { border: 1px solid var(--outline-variant); border-radius: var(--radius-lg); overflow: hidden; background: var(--surface-container-lowest); }
  .kw { color: var(--primary); font-weight: 600; }
  .str { color: var(--tertiary); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { DataTable, SQLPreview, StatusChip } = window.NexusClinicalAIDesignSystem_29a409;
  const rows = [
    { id: "PT-8829", name: "Doe, Jonathan", risk: "High Risk", tone: "critical" },
    { id: "PT-1044", name: "Smith, Sarah", risk: "Needs Review", tone: "warning" },
    { id: "PT-5510", name: "Chen, Wei", risk: "Stable", tone: "stable" },
    { id: "PT-9921", name: "Garcia, Maria", risk: "Needs Review", tone: "warning" },
  ];
  const cols = [
    { key: "id", header: "Patient ID", mono: true },
    { key: "name", header: "Name" },
    { key: "risk", header: "Risk Status", render: r => <StatusChip tone={r.tone}>{r.risk}</StatusChip> },
  ];
  const sql = `<span class="kw">SELECT</span> DATE_TRUNC(<span class="str">'day'</span>, admission_date),\n       <span class="kw">COUNT</span>(*) <span class="kw">AS</span> high_risk\n<span class="kw">FROM</span> patients_core\n<span class="kw">WHERE</span> risk_score &gt;= <span class="str">0.8</span>\n<span class="kw">GROUP BY</span> <span class="str">1</span>;`;
  function Demo() {
    return (
      <div className="grid">
        <div className="frame"><DataTable columns={cols} rows={rows} /></div>
        <SQLPreview html={sql} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
