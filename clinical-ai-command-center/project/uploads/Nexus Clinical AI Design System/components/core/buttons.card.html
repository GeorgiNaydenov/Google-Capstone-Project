<head>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<style>
  body { margin: 0; padding: 20px; background: var(--background); font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .lbl { width: 88px; font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--on-surface-variant); flex-shrink: 0; }

<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Icon } = window.NexusClinicalAIDesignSystem_29a409;
  function Demo() {
    return (
      <div>
        <div className="row"><span className="lbl">Variants</span>
          <Button variant="primary" icon="add">New Session</Button>
          <Button variant="secondary">Reassign</Button>
          <Button variant="outline">Execute</Button>

        <div className="row"><span className="lbl">Sizes</span>

          <Button size="sm" icon="send">Synthesize</Button>
          <Button size="sm" variant="outline" iconRight="arrow_forward">Review</Button>
          <Button size="md" disabled>Disabled</Button>
        </div>
        <div className="row"><span className="lbl">Icon btn</span>
          <IconButton icon="sync" label="Sync" />

          <IconButton icon="account_circle" label="Account" />
          <IconButton icon="bar_chart" label="Chart" active />

          <Icon name="warning" size={22} style={{color:'var(--error)'}} />
          <Icon name="verified" size={22} fill={1} style={{color:'var(--success)'}} />
        </div>
      </div>
    );

  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
