<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--background); font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .lbl { width: 96px; font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--on-surface-variant); flex-shrink: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { StatusChip, ConfidenceMeter, EvidenceCitation } = window.NexusClinicalAIDesignSystem_29a409;
  function Demo() {
    return (
      <div>
        <div className="row"><span className="lbl">Status</span>
          <StatusChip tone="critical" icon="warning">High Risk</StatusChip>
          <StatusChip tone="warning">Needs Review</StatusChip>
          <StatusChip tone="stable">Stable</StatusChip>
          <StatusChip tone="verified" icon="verified">Verified</StatusChip>
          <StatusChip tone="info">Extracted</StatusChip>
          <StatusChip tone="neutral">Archived</StatusChip>
        </div>
        <div className="row"><span className="lbl">Confidence</span>
          <ConfidenceMeter value={98} label="Execution" />
          <ConfidenceMeter value={72} label="OCR" />
          <ConfidenceMeter value={44} label="Match" />
        </div>
        <div className="row" style={{alignItems:'stretch'}}><span className="lbl" style={{paddingTop:8}}>Evidence</span>
          <div style={{maxWidth:420}}>
            <EvidenceCitation index={1} snippet="Correlates with 'Facility C' admitting protocol change implemented on Oct 10." sourceLabel="View Source Audit" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
