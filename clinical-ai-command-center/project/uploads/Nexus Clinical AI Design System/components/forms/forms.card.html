<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; background: var(--background); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; align-items: start; }
  .lbl { font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--on-surface-variant); display: block; margin-bottom: 6px; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Textarea, Select, Checkbox } = window.NexusClinicalAIDesignSystem_29a409;
  function Demo() {
    const [c1, setC1] = React.useState(true);
    const [c2, setC2] = React.useState(true);
    const [c3, setC3] = React.useState(false);
    return (
      <div className="grid">
        <div>
          <span className="lbl">Search input</span>
          <Input icon="search" placeholder="Search Patients or IDs..." defaultValue="PT-8829" />
          <div style={{height:12}} />
          <span className="lbl">Select</span>
          <Select defaultValue="Last 6 Months">
            <option>Last 6 Months</option><option>Last 12 Months</option><option>All Time</option>
          </Select>
          <div style={{height:12}} />
          <span className="lbl">Source types</span>
          <div className="stack">
            <Checkbox checked={c1} onChange={()=>setC1(!c1)} label="Clinical Notes (Text)" />
            <Checkbox checked={c2} onChange={()=>setC2(!c2)} label="Imaging Reports (Vector)" />
            <Checkbox checked={c3} onChange={()=>setC3(!c3)} label="Lab Results (Structured)" />
          </div>
        </div>
        <div>
          <span className="lbl">Natural-language ask</span>
          <Textarea rows={4} defaultValue="Summarize recent MRI findings regarding the secondary lesion." />
          <div style={{height:12}} />
          <span className="lbl">Invalid state</span>
          <Input invalid defaultValue="risk_score >> 0.8" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
