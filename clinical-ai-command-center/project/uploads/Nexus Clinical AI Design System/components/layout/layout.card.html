<!DOCTYPE html>

<head>

<style>
  body { margin: 0; padding: 20px; background: var(--background); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; align-items: start; }
  p { font-size: 13px; color: var(--on-surface-variant); line-height: 18px; margin: 0; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Panel, Button, StatusChip } = window.NexusClinicalAIDesignSystem_29a409;
  function Demo() {
    return (
      <div className="grid">
        <Panel title="AI Recommendations" icon="lightbulb" iconColor="var(--primary)"
               actions={<Button variant="ghost" size="sm">View All</Button>}>
          <p style={{marginBottom:8,color:'var(--on-surface)',fontWeight:600}}>Re-run extraction for PT-8829</p>

          <div style={{marginTop:12,display:'flex',justifyContent:'flex-end'}}>
            <Button variant="outline" size="sm">Execute</Button>
          </div>
        </Panel>
        <Panel title="Risk Summary" icon="monitor_heart" iconColor="var(--error)">
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <StatusChip tone="critical" icon="warning">High Risk</StatusChip>
            <StatusChip tone="info">Oncology</StatusChip>
            <StatusChip tone="info">NSCLC</StatusChip>
          </div>
        </Panel>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
