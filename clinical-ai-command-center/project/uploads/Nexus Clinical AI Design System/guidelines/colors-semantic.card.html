<!-- @dsCard group="Colors" viewport="700x150" name="Semantic & Status" subtitle="Risk, validation and confidence signals" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:16px; background:var(--background); font-family:var(--font-sans); }
  .swatches { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .sw { border:1px solid var(--outline-variant); border-radius:var(--radius-md); overflow:hidden; }
  .pair { display:flex; height:48px; }
  .meta { padding:6px 8px; background:var(--surface-container-lowest); }
  .name { font-size:11px; font-weight:600; color:var(--on-surface); }
  .val { font-family:var(--font-mono); font-size:10px; color:var(--on-surface-variant); }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw"><div class="pair"><div style="flex:1;background:var(--error)"></div><div style="flex:1;background:var(--error-container)"></div></div><div class="meta"><div class="name">Critical</div><div class="val">#ba1a1a</div></div></div>
  <div class="sw"><div class="pair"><div style="flex:1;background:var(--tertiary)"></div><div style="flex:1;background:var(--tertiary-fixed)"></div></div><div class="meta"><div class="name">Warning</div><div class="val">#943700</div></div></div>
  <div class="sw"><div class="pair"><div style="flex:1;background:var(--primary)"></div><div style="flex:1;background:var(--primary-fixed)"></div></div><div class="meta"><div class="name">Stable / AI</div><div class="val">#004ac6</div></div></div>
  <div class="sw"><div class="pair"><div style="flex:1;background:var(--success)"></div><div style="flex:1;background:var(--success-container)"></div></div><div class="meta"><div class="name">Verified</div><div class="val">#047857</div></div></div>
</div>
</body>
</html>
