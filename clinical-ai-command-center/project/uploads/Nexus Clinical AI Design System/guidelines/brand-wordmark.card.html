<!-- @dsCard group="Brand" viewport="700x170" name="Logo & Wordmark" subtitle="Clinician AI KIT mark and lockup" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; background:var(--surface-container-lowest); font-family:var(--font-sans); display:flex; }
  .a { flex:1.2; display:flex; align-items:center; gap:14px; justify-content:center; padding:24px; border-right:1px solid var(--outline-variant); }
  .b { flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
  .lock { display:flex; align-items:center; gap:12px; }
  .mark { height:44px; width:auto; }
  .name { font-size:22px; font-weight:700; letter-spacing:-0.01em; color:var(--on-surface); }
  .sub { display:block; font-size:10px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--on-surface-variant); margin-top:2px; }
</style>
</head>
<body>
  <div class="a">
    <div class="lock">
      <img class="mark" src="../assets/clinician-ai-kit-mark.png" alt="Clinician AI KIT mark" />
      <div><span class="name">Clinician AI KIT</span><span class="sub">Clinical Command v2.4</span></div>
    </div>
  </div>
  <div class="b"><img src="../assets/clinician-ai-kit-mark.png" alt="Clinician AI KIT mark" style="height:64px;width:auto" /></div>
</body>
</html>
