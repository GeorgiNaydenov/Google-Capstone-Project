<!-- @dsCard group="Colors" viewport="700x150" name="Secondary & Tertiary" subtitle="Slate structure and burnt-amber AI accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:16px; background:var(--background); font-family:var(--font-sans); }
  .swatches { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
  .sw { border:1px solid var(--outline-variant); border-radius:var(--radius-md); overflow:hidden; }
  .chip { height:52px; }
  .meta { padding:6px 8px; background:var(--surface-container-lowest); }
  .name { font-size:11px; font-weight:600; color:var(--on-surface); }
  .val { font-family:var(--font-mono); font-size:10px; color:var(--on-surface-variant); }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw"><div class="chip" style="background:var(--secondary)"></div><div class="meta"><div class="name">secondary</div><div class="val">#515f74</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--secondary-container)"></div><div class="meta"><div class="name">sec-container</div><div class="val">#d5e3fc</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--secondary-fixed-dim)"></div><div class="meta"><div class="name">sec-fixed-dim</div><div class="val">#b9c7df</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--tertiary)"></div><div class="meta"><div class="name">tertiary</div><div class="val">#943700</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--tertiary-container)"></div><div class="meta"><div class="name">tert-container</div><div class="val">#bc4800</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--tertiary-fixed)"></div><div class="meta"><div class="name">tert-fixed</div><div class="val">#ffdbcd</div></div></div>
</div>
</body>
</html>
