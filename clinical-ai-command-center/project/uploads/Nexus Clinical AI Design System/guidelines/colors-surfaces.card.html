<!-- @dsCard group="Colors" viewport="700x160" name="Surfaces & Tonal Layering" subtitle="Depth without shadow — stacked surface tones" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:16px; background:var(--background); font-family:var(--font-sans); }
  .swatches { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
  .sw { border:1px solid var(--outline-variant); border-radius:var(--radius-md); overflow:hidden; }
  .chip { height:48px; }
  .meta { padding:6px 8px; background:var(--surface-container-lowest); }
  .name { font-size:10px; font-weight:600; color:var(--on-surface); }
  .val { font-family:var(--font-mono); font-size:10px; color:var(--on-surface-variant); }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw"><div class="chip" style="background:var(--surface-container-lowest)"></div><div class="meta"><div class="name">lowest</div><div class="val">#ffffff</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-container-low)"></div><div class="meta"><div class="name">low</div><div class="val">#f3f3fe</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-container)"></div><div class="meta"><div class="name">container</div><div class="val">#ededf9</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-container-high)"></div><div class="meta"><div class="name">high</div><div class="val">#e7e7f3</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-container-highest)"></div><div class="meta"><div class="name">highest</div><div class="val">#e1e2ed</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--inverse-surface)"></div><div class="meta"><div class="name">inverse</div><div class="val">#2e3039</div></div></div>
</div>
</body>
</html>
