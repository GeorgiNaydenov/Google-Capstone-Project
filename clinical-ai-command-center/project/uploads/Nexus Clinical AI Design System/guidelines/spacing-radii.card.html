<!-- @dsCard group="Spacing" viewport="700x150" name="Corner Radii" subtitle="Soft-Geometric — 4 / 6 / 8px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px; background:var(--surface-container-lowest); font-family:var(--font-sans); }
  .row { display:flex; align-items:flex-end; gap:24px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width:72px; height:56px; background:var(--surface-container); border:1px solid var(--outline-variant); }
  .lbl { font-size:11px; color:var(--on-surface); font-weight:600; }
  .val { font-family:var(--font-mono); font-size:10px; color:var(--on-surface-variant); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lbl">sm — chips, tags</div><div class="val">4px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl">md — buttons, inputs</div><div class="val">6px (default)</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl">lg — panels, modals</div><div class="val">8px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-full);width:56px"></div><div class="lbl">full — pills</div><div class="val">9999px</div></div>
</div>
</body>
</html>
