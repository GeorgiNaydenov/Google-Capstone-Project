<!-- @dsCard group="Type" viewport="700x180" name="Body, Table & Label" subtitle="body-md · table-text · label-caps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px; background:var(--surface-container-lowest); font-family:var(--font-sans); color:var(--on-surface); }
  .spec { display:flex; align-items:baseline; gap:16px; padding:8px 0; border-bottom:1px solid var(--outline-variant); }
  .spec:last-child { border-bottom:none; }
  .tag { width:120px; flex-shrink:0; font-family:var(--font-mono); font-size:10px; color:var(--on-surface-variant); }
  .bd { font-size:var(--type-body-size); line-height:var(--type-body-line); }
  .tt { font-size:var(--type-table-size); line-height:var(--type-table-line); color:var(--on-surface-variant); }
  .lc { font-size:var(--type-label-caps-size); line-height:var(--type-label-caps-line); font-weight:var(--type-label-caps-weight); letter-spacing:var(--type-label-caps-tracking); text-transform:uppercase; color:var(--on-surface-variant); }
</style>
</head>
<body>
  <div class="spec"><span class="tag">body-md · 14/400</span><span class="bd">Synthesizing fragmented patient data into a single timeline.</span></div>
  <div class="spec"><span class="tag">table-text · 13/400</span><span class="tt">Elevated troponin detected in recent lab extraction.</span></div>
  <div class="spec"><span class="tag">label-caps · 11/700</span><span class="lc">AI Flag Reason</span></div>
</body>
</html>
