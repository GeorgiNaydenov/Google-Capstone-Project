<!-- @dsCard group="Type" viewport="700x180" name="Titles — Inter" subtitle="page-title · section-title · panel-title" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px; background:var(--surface-container-lowest); font-family:var(--font-sans); color:var(--on-surface); }
  .spec { display:flex; align-items:baseline; gap:16px; padding:8px 0; border-bottom:1px solid var(--outline-variant); }
  .spec:last-child { border-bottom:none; }
  .tag { width:120px; flex-shrink:0; font-family:var(--font-mono); font-size:10px; color:var(--on-surface-variant); }
  .pt { font-size:var(--type-page-title-size); line-height:var(--type-page-title-line); font-weight:var(--type-page-title-weight); letter-spacing:var(--type-page-title-tracking); }
  .st { font-size:var(--type-section-title-size); line-height:var(--type-section-title-line); font-weight:var(--type-section-title-weight); }
  .pnt { font-size:var(--type-panel-title-size); line-height:var(--type-panel-title-line); font-weight:var(--type-panel-title-weight); }
</style>
</head>
<body>
  <div class="spec"><span class="tag">page-title · 26/600</span><span class="pt">Nexus Clinical AI</span></div>
  <div class="spec"><span class="tag">section-title · 18/600</span><span class="st">Priority Patient Queue</span></div>
  <div class="spec"><span class="tag">panel-title · 15/600</span><span class="pnt">AI Recommendations</span></div>
</body>
</html>
