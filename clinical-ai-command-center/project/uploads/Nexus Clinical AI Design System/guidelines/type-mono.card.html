<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:18px; background:var(--surface-container-lowest); font-family:var(--font-mono); color:var(--on-surface); }
  .block { background:var(--surface-container-highest); border:1px solid var(--outline-variant); border-radius:var(--radius-md); padding:12px; font-size:var(--type-mono-size); line-height:1.5; }
  .kw { color:var(--primary); font-weight:600; }
  .str { color:var(--tertiary); }
  .meta { margin-top:10px; display:flex; gap:20px; font-size:12px; color:var(--on-surface-variant); }
</style>
</head>
<body>
  <div class="block"><span class="kw">SELECT</span> patient_id, risk_score <span class="kw">FROM</span> patients_core<br/><span class="kw">WHERE</span> risk_score &gt;= <span class="str">0.8</span> <span class="kw">ORDER BY</span> risk_score <span class="kw">DESC</span>;</div>
  <div class="meta"><span>PT-8829</span><span>10:42 AM</span><span>280ms</span><span>p &lt; 0.05</span></div>
</body>
</html>
