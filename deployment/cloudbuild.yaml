# Cloud Build pipeline for deploying Clinical AI Kit to Cloud Run.
#
# Trigger from the repo root:
#   gcloud builds submit --config deployment/cloudbuild.yaml .
#
# Default auth path:
# - Cloud Run calls Gemini through Vertex AI using the runtime service account.
# - No GOOGLE_API_KEY is baked into the image or required by this pipeline.
#
# One-time IAM for the runtime service account:
#   gcloud projects add-iam-policy-binding PROJECT_ID \
#     --member="serviceAccount:PROJECT_NUMBER-compute@developer.gserviceaccount.com" \
#     --role="roles/aiplatform.user"
#
# If ENABLE_TRACING=TRUE stays enabled, also grant Cloud Trace writes when your
# organization does not include it by default:
#   gcloud projects add-iam-policy-binding PROJECT_ID \
#     --member="serviceAccount:PROJECT_NUMBER-compute@developer.gserviceaccount.com" \
#     --role="roles/cloudtrace.agent"
#
# Optional API-key mode instead of Vertex:
#   gcloud secrets create GOOGLE_API_KEY --replication-policy=automatic
#   printf "KEY" | gcloud secrets versions add GOOGLE_API_KEY --data-file=-
# Then change GOOGLE_GENAI_USE_VERTEXAI=FALSE and add:
#   --update-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest
#
# CLINICAL_DATA_DIR=/data is mounted onto _DATA_BUCKET (GCS FUSE, gen2 only) so
# the real (capstone) tenant's capstone.db and uploads survive redeploys and
# scale-to-zero; demo tenants keep no files and do not need this volume.
#   gcloud storage buckets create gs://_DATA_BUCKET --location=_REGION
#   gsutil iam ch serviceAccount:PROJECT_NUMBER-compute@developer.gserviceaccount.com:roles/storage.objectAdmin gs://_DATA_BUCKET

substitutions:
  _REGION: us-central1
  _SERVICE: clinical-ai-kit
  _REPOSITORY: clinical-ai-kit
  _IMAGE: clinical-ai-kit
  _DATA_BUCKET: capstone-project-500212-clinical-data

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts repositories describe "${_REPOSITORY}" --location="${_REGION}" >/dev/null 2>&1 ||
        gcloud artifacts repositories create "${_REPOSITORY}" \
          --repository-format=docker \
          --location="${_REGION}" \
          --description="Clinical AI Kit container images"

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
      - -f
      - deployment/Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --concurrency=20
      - --min-instances=0
      - --max-instances=1
      - --execution-environment=gen2
      - --add-volume=name=data,type=cloud-storage,bucket=${_DATA_BUCKET}
      - --add-volume-mount=volume=data,mount-path=/data
      - --set-env-vars=AGENT_EXECUTION_MODE=live,GOOGLE_GENAI_USE_VERTEXAI=TRUE,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=global,HIPAA_MODE=TRUE,PHI_REDACTION=TRUE,MEMORY_BACKEND=memory,SESSION_BACKEND=memory,ENABLE_TRACING=TRUE,TRACE_EXPORTER=gcp,CLINICAL_DATA_DIR=/data

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
